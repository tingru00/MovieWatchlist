<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>

<body>
<!-- Navigation menu for switching between sections --> 
<nav>
    <button onclick="showSection('movies')">My Movies</button>

    <h1 class="logo">MOVIE NIGHT</h1>

    <button onclick="showSection('add')">Add Movie</button>
</nav>

<!-- Section displaying all movies -->
<section id="moviesSection">
    <ul id="list"></ul>
</section>

<!-- Section for adding or editing movies -->
<section id="addSection" class="hidden">
    <form id="movieForm">
<input type="text" id="title" placeholder="Title" required />
<input type="text" id="description" placeholder="Description" required />
<input type="text" id="genre" placeholder="Genre" required />
<input type="text" id="imageUrl" placeholder="Image URL" required />
<input type="datetime-local" id="date" required />

<button type="submit">Add Movie</button>
    </form>
</section>

</body>
